<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iris and the Moonlit Garden</title>
  <meta name="theme-color" content="#7b5dc8">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="game-surface" aria-label="Iris and the Moonlit Garden">
      <!-- HUD (Hidden initially) -->
      <div class="topbar hidden" id="hud">
        <div>
          <h1>Iris 与月光花园</h1>
          <p id="missionText">收集星光种子，点亮月光花园。</p>
        </div>
        <div class="stats" aria-live="polite">
          <span id="levelStat">🌙 第 1 关</span>
          <span id="seedStat">⭐ 星种子：0 / 0</span>
          <span id="bonusStat">寻找钥匙</span>
          <span id="timeStat">⏱ 时间 0:00</span>
          <span id="heartStat">💖 ♡♡♡</span>
          <button id="muteBtn" class="icon-btn" type="button" aria-label="关闭声音" aria-pressed="false">🔊</button>
        </div>
      </div>

      <div class="progress hidden" id="progressBar" aria-hidden="true">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="960" height="576"></canvas>
        <div id="damageFlash" class="damage-flash hidden" aria-hidden="true"></div>
        <div id="toast" class="toast hidden" aria-live="polite"></div>
        
        <!-- Start / Title Overlay -->
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <h1 id="overlayTitle" style="font-size: 2.5rem; margin-bottom: 10px; color: #7b5dc8;">月光花园</h1>
            <svg class="title-art" viewBox="0 0 220 120" role="img" aria-label="月亮和花朵">
              <circle cx="108" cy="47" r="32" fill="#ffe28a"/>
              <circle cx="122" cy="39" r="32" fill="#fffaf0"/>
              <path d="M30 100 C64 72, 92 116, 122 92 S176 76, 202 104" fill="none" stroke="#7fb18c" stroke-width="7" stroke-linecap="round"/>
              <g fill="#d85f76">
                <circle cx="58" cy="86" r="8"/><circle cx="70" cy="86" r="8"/><circle cx="64" cy="76" r="8"/>
              </g>
              <circle cx="64" cy="84" r="5" fill="#f2b83d"/>
              <g fill="#7b5dc8">
                <circle cx="156" cy="80" r="7"/><circle cx="168" cy="80" r="7"/><circle cx="162" cy="70" r="7"/>
              </g>
              <circle cx="162" cy="78" r="4" fill="#f2b83d"/>
            </svg>
            <p id="overlayCopy" class="story-copy">很久以前，月光花园是世界上最亮的地方。<br>直到有一天，星星都睡着了，花园变得漆黑。<br>小女孩 Iris 提着灯笼出发了，她要找回所有星光种子，唤醒沉睡的月亮门。</p>
            
            <!-- Cozy Mode Toggle -->
            <div class="setting-item" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin: 20px 0;">
              <span style="font-weight: bold; color: #2e8b68;">温馨模式 (更轻松)：</span>
              <label class="switch">
                <input type="checkbox" id="cozyToggle" checked>
                <span class="slider round"></span>
              </label>
              <small class="cozy-note">温馨模式：无限生命 · 不计时</small>
            </div>

            <div class="menu-buttons" style="display: flex; flex-direction: column; gap: 10px; width: 200px; margin: 0 auto;">
              <button id="startBtn" type="button" class="btn-primary">开始冒险</button>
              <button id="levelSelectBtn" type="button" class="btn-secondary">选择关卡</button>
            </div>
          </div>
        </div>

        <div id="level-select-overlay" class="overlay hidden">
          <div class="overlay-panel level-select-panel">
            <h2>选择关卡</h2>
            <div id="levelGrid" class="level-grid" aria-label="关卡列表"></div>
            <button id="levelBackBtn" type="button" class="btn-secondary">返回</button>
          </div>
        </div>

        <div id="pause-overlay" class="overlay hidden">
          <div class="overlay-panel">
            <h2>暂停中</h2>
            <div class="menu-buttons">
              <button id="resumeBtn" type="button" class="btn-primary">继续</button>
              <button id="restartLevelBtn" type="button">重新开始本关</button>
              <button id="mainMenuBtn" type="button" class="btn-secondary">返回主菜单</button>
            </div>
          </div>
        </div>

        <div id="confirm-overlay" class="overlay hidden">
          <div class="overlay-panel">
            <h2>确定离开本关吗？</h2>
            <p>进度会丢失。</p>
            <div class="menu-buttons">
              <button id="confirmLeaveBtn" type="button" class="btn-primary">确定离开</button>
              <button id="cancelLeaveBtn" type="button" class="btn-secondary">继续冒险</button>
            </div>
          </div>
        </div>

        <!-- Level Complete Overlay -->
        <div id="complete-overlay" class="overlay hidden">
          <div class="overlay-panel">
            <h2 style="color: #2e8b68;">闯关成功！</h2>
            <div class="stars-display" aria-label="本关星星" style="font-size: 2rem; color: #ffd700; margin: 10px 0;">
              <span>☆</span><span>☆</span><span>☆</span>
            </div>
            <p id="complete-stats">种子: 8/8 | 时间: 1:20 | 生命: 3</p>
            <button id="nextLevelBtn" class="btn-primary" style="margin-top: 15px;">下一关</button>
          </div>
        </div>

        <div class="mobile-controls" aria-label="移动端控制">
          <div class="mobile-pad" aria-label="虚拟方向键">
            <button data-dir="up" type="button" aria-label="向上">↑</button>
            <button data-dir="left" type="button" aria-label="向左">←</button>
            <button data-dir="down" type="button" aria-label="向下">↓</button>
            <button data-dir="right" type="button" aria-label="向右">→</button>
          </div>
          <button id="mobilePauseBtn" class="mobile-pause" type="button" aria-label="暂停">暂停</button>
        </div>

        <div id="tutorialBubble" class="tutorial-bubble hidden" aria-live="polite"></div>
      </div>

      <div class="controls">
        <button id="restartBtn" type="button">重新开始</button>
        <button id="pauseBtn" type="button">暂停</button>
        <button id="helpBtn" type="button">帮我一下</button>
        <p class="hint">使用方向键或 WASD 移动。空格暂停。蓝色池塘会减慢速度；粉色爱心可以恢复生命。</p>
        <div class="pad" aria-label="方向键">
          <button data-dir="up" type="button">↑</button>
          <button data-dir="left" type="button">←</button>
          <button data-dir="down" type="button">↓</button>
          <button data-dir="right" type="button">→</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Floating Text Container -->
  <div id="floating-text-container" style="position: absolute; pointer-events: none; inset: 0; overflow: hidden;"></div>

  <script src="./save-manager.js"></script>
  <script src="./audio-manager.js"></script>
  <script src="./game.js"></script>
  <script src="./bot.js"></script>
</body>
</html>
