<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iris and the Moonlit Garden</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="game-surface" aria-label="Iris and the Moonlit Garden">
      <div class="topbar">
        <div>
          <h1>Iris 与月光花园</h1>
          <p id="missionText">收集星光种子，点亮月光花园。</p>
        </div>
        <div class="stats" aria-live="polite">
          <span id="levelStat">🌙 第 1 关：月光小径</span>
          <span id="seedStat">⭐ 星种子：0 / 8</span>
          <span id="bonusStat">月亮路径</span>
          <span id="timeStat">⏱ 时间 0:00</span>
          <span id="heartStat">💖 ♡♡♡</span>
        </div>
      </div>

      <div class="progress" aria-hidden="true">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="960" height="576"></canvas>
        <div id="toast" class="toast hidden" aria-live="polite"></div>
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <h2 id="overlayTitle">准备好了吗，Iris？</h2>
            <p id="overlayCopy">第 1 关：月光小径。收集所有星光种子，然后走进发光的月光门。</p>
            <button id="startBtn" type="button">开始冒险</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="restartBtn" type="button">重新开始</button>
        <button id="pauseBtn" type="button">暂停</button>
        <button id="botBtn" type="button">帮我一下</button>
        <p class="hint">使用方向键或 WASD 移动。空格暂停。蓝色池塘会减慢 Iris 的速度；粉色爱心可以恢复生命。</p>
        <div class="pad" aria-label="方向键">
          <button data-dir="up" type="button">↑</button>
          <button data-dir="left" type="button">←</button>
          <button data-dir="down" type="button">↓</button>
          <button data-dir="right" type="button">→</button>
        </div>
      </div>
    </section>
  </main>

  <script src="./game.js"></script>
  <script src="./bot.js"></script>
</body>
</html>
